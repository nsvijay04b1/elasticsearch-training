  <script>
    const titles = {
      m1: "Module 1: Introduction & Cluster Basics",
      m2: "Module 2: Install, Security & Monitoring",
      m3: "Module 3: Data Ingestion & Mapping",
      m4: "Module 4: Search & Query DSL",
      m5: "Module 5: Data Management & Snapshots",
      m6: "Module 6: APIs & Scripting",
      m7: "Module 7: Advanced Use Cases & Day 2"
    };

    const quizData = {
      m1: [
        // Q1
        ["What is a shard in Elasticsearch?",
          `<p>A shard is a <strong>partition of an index</strong>. Each index is divided into one or more shards, each being a self-contained Lucene index that can be hosted on any node.</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">┌─────────────── Index: products ───────────────┐
│                                                │
│  ┌───────────┐  ┌───────────┐     Primary      │
│  │  Shard 0  │  │  Shard 1  │     Shards       │
│  │ docs 0-499│  │docs 500-999│                  │
│  └───────────┘  └───────────┘                   │
│                                                │
│  ┌───────────┐  ┌───────────┐     Replica      │
│  │ Replica 0 │  │ Replica 1 │     Shards       │
│  └───────────┘  └───────────┘                   │
└────────────────────────────────────────────────┘</div></div>
<ul>
  <li><strong>Primary shards</strong> hold the original data</li>
  <li><strong>Replica shards</strong> are backup copies on different nodes</li>
  <li>Default: 1 primary, 1 replica per index</li>
</ul>`],

        // Q2
        ["What does yellow cluster health status mean?",
          `<p>Yellow means all <strong>primary shards</strong> are allocated, but one or more <strong>replica shards</strong> are unassigned.</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">Cluster Health Status:

  🟢 GREEN    All primaries + all replicas assigned
  🟡 YELLOW   All primaries OK, some replicas missing
  🔴 RED      Some primaries are unassigned (data loss risk!)</div></div>
<p>Common cause: Running a single-node cluster where replicas cannot be placed on a different node.</p>
<p>Check with:</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="cmd-block"><span class="prompt">$</span> curl -X GET <span class="url">"localhost:9200/_cluster/health?pretty"</span></div></div>`],

        // Q3
        ["What is the default port for Elasticsearch?",
          `<p><strong>9200</strong> — the REST API HTTP port.</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">Port Layout:

  ┌────────┬───────────────────────────────────────┐
  │  9200  │  REST API (HTTP)  ← client requests   │
  ├────────┼───────────────────────────────────────┤
  │  9300  │  Transport (TCP)  ← node-to-node      │
  ├────────┼───────────────────────────────────────┤
  │  5601  │  Kibana Web UI                        │
  └────────┴───────────────────────────────────────┘</div></div>
<p>Kibana connects to Elasticsearch on port <strong>9200</strong>.<br>
Kibana itself serves its UI on port <strong>5601</strong>.</p>`],

        // Q4
        ["What is an inverted index and why does Elasticsearch use it?",
          `<p>An inverted index maps each unique <strong>term</strong> to the list of <strong>document IDs</strong> containing it — like a book's back-of-the-book index.</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">Documents:
  Doc 1: "Running Shoes"
  Doc 2: "Hiking Shoes"
  Doc 3: "Running Gear"

Inverted Index:
  ┌───────────┬──────────┐
  │   Term    │  Doc IDs │
  ├───────────┼──────────┤
  │ running   │  [1, 3]  │
  │ shoes     │  [1, 2]  │
  │ hiking    │  [2]     │
  │ gear      │  [3]     │
  └───────────┴──────────┘</div></div>
<p>This makes full-text search <strong>O(1)</strong> per term lookup instead of scanning every document.</p>`],

        // Q5
        ["What is the role of the Coordinating Node?",
          `<p>The <strong>Coordinating Node</strong> is the node that receives the client request. It orchestrates the search across all shards.</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">        Client
          │
          ▼
  ┌───────────────────┐
  │ Coordinating Node │  ← receives request
  └────────┬──────────┘
           │  scatter
     ┌─────┴─────┐
     ▼           ▼
  ┌───────┐  ┌───────┐
  │Shard 0│  │Shard 1│  ← local search
  └───┬───┘  └───┬───┘
      │  gather  │
      └────┬─────┘
           ▼
     Merge + Rank
           ▼
       Response</div></div>
<ol>
  <li><strong>Scatters</strong> the query to all relevant shards</li>
  <li><strong>Gathers</strong> partial results from each shard</li>
  <li><strong>Merges & ranks</strong> the combined results</li>
  <li><strong>Returns</strong> the final response to the client</li>
</ol>`]
      ],

      m2: [
        // Q1
        ["What does the master node manage?",
          `<p>The master node is the <strong>brain</strong> of the cluster, responsible for lightweight coordination tasks:</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">Node Roles:

  ┌─────────────┐  ┌─────────────┐  ┌─────────────┐
  │   MASTER    │  │    DATA     │  │   INGEST    │
  ├─────────────┤  ├─────────────┤  ├─────────────┤
  │ • Cluster   │  │ • Stores    │  │ • Runs      │
  │   state     │  │   shards    │  │   ingest    │
  │ • Shard     │  │ • Executes  │  │   pipelines │
  │   allocation│  │   CRUD &    │  │ • Pre-      │
  │ • Index     │  │   search    │  │   processes │
  │   management│  │ • I/O heavy │  │   documents │
  └─────────────┘  └─────────────┘  └─────────────┘</div></div>
<p><span class="label label-tip">TIP</span> In production, dedicate 3 master-eligible nodes for high availability.</p>`],

        // Q2
        ["What is RBAC in Elasticsearch?",
          `<p><strong>Role-Based Access Control</strong> — security mechanism where permissions are assigned to <em>roles</em>, and roles are assigned to <em>users</em>.</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">User: "analyst"
  └── Role: "read_only"
       └── Privileges:
            • indices:data/read on logs-*
            • cluster:monitor

User: "admin"
  └── Role: "superuser"
       └── Privileges:
            • ALL on ALL indices</div></div>
<p>Enabled via <code>elasticsearch.yml</code>:</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="cmd-block">xpack.security.enabled: true</div></div>`],

        // Q3
        ["Which API checks cluster health?",
          `<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="cmd-block"><span class="prompt">$</span> curl -X GET <span class="url">"localhost:9200/_cluster/health?pretty"</span></div></div>
<p>Response:</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="json-block">{
  <span class="key">"cluster_name"</span>: <span class="str">"my-cluster"</span>,
  <span class="key">"status"</span>:       <span class="str">"green"</span>,            <span class="comment">// overall health</span>
  <span class="key">"number_of_nodes"</span>: <span class="num">3</span>,
  <span class="key">"active_primary_shards"</span>: <span class="num">10</span>,
  <span class="key">"active_shards"</span>: <span class="num">20</span>,          <span class="comment">// primaries + replicas</span>
  <span class="key">"unassigned_shards"</span>: <span class="num">0</span>       <span class="comment">// should be 0 if green</span>
}</div></div>`],

        // Q4
        ["How do you reset the elastic superuser password?",
          `<p><strong>Method 1: CLI tool</strong> (works even if you forgot the password)</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="cmd-block"><span class="prompt">$</span> sudo /usr/share/elasticsearch/bin/elasticsearch-reset-password -u elastic -i</div></div>
<p><strong>Method 2: REST API</strong> (requires knowing current password)</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="json-block">POST _security/user/elastic/_password
{
  <span class="key">"password"</span>: <span class="str">"new_secure_password"</span>
}</div></div>
<p><span class="label label-tip">TIP</span> The CLI tool is the recommended approach for recovery scenarios.</p>`],

        // Q5
        ["What is the difference between a rolling upgrade and a full-cluster restart?",
          `<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">Rolling Upgrade (zero downtime):
  Node 1  ──stop──upgrade──start─────────────────
  Node 2  ─────────────────stop──upgrade──start──
  Node 3  ───────────────────────stop──upgrade──start

Full-Cluster Restart (downtime required):
  Node 1  ──stop──┐
  Node 2  ──stop──┤  upgrade all  ──start all
  Node 3  ──stop──┘</div></div>
<ul>
  <li><strong>Rolling</strong> — one node at a time, no downtime, for minor versions</li>
  <li><strong>Full restart</strong> — all nodes stop, simpler for major version jumps</li>
</ul>
<p><span class="label label-warn">NOTE</span> Disable shard allocation before stopping nodes:<br>
<code>PUT _cluster/settings { "persistent": { "cluster.routing.allocation.enable": "none" } }</code></p>`]
      ],

      m3: [
        // Q1
        ["What is a mapping in Elasticsearch?",
          `<p>A mapping defines the <strong>schema</strong> of an index — the data type of each field.</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="json-block">PUT products
{
  <span class="key">"mappings"</span>: {
    <span class="key">"properties"</span>: {
      <span class="key">"name"</span>:  { <span class="key">"type"</span>: <span class="str">"text"</span> },       <span class="comment">// analyzed for search</span>
      <span class="key">"sku"</span>:   { <span class="key">"type"</span>: <span class="str">"keyword"</span> },    <span class="comment">// exact match</span>
      <span class="key">"price"</span>: { <span class="key">"type"</span>: <span class="str">"float"</span> },
      <span class="key">"date"</span>:  { <span class="key">"type"</span>: <span class="str">"date"</span> }
    }
  }
}</div></div>
<p><span class="label label-warn">WARNING</span> Mappings are <strong>immutable</strong> once set — you cannot change a field's type after creation.</p>`],

        // Q2
        ["What is the difference between text and keyword field types?",
          `<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">Input value: "Running Shoes"

┌──────────────┬─────────────────────────────────────┐
│   Field Type │   What Happens                      │
├──────────────┼─────────────────────────────────────┤
│   text       │   Analyzed → tokens:                │
│              │   ["running", "shoes"]              │
│              │   Use: full-text search              │
│              │   Matches: "running", "shoes", "run"│
├──────────────┼─────────────────────────────────────┤
│   keyword    │   NOT analyzed → stored as-is:      │
│              │   "Running Shoes"                    │
│              │   Use: filtering, sorting, aggs      │
│              │   Matches: exact "Running Shoes"     │
└──────────────┴─────────────────────────────────────┘</div></div>
<p><strong>Rule of thumb:</strong></p>
<ul>
  <li><code>text</code> — fields users will <em>search</em> (title, description)</li>
  <li><code>keyword</code> — fields used to <em>filter, sort, aggregate</em> (status, email)</li>
</ul>`],

        // Q3
        ["What is the Bulk API used for?",
          `<p>The Bulk API indexes <strong>multiple documents in a single HTTP request</strong>, dramatically reducing network overhead.</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="json-block">POST _bulk
{"index":{"_index":"products","_id":"1"}}
{"name":"Laptop","price":999}
{"index":{"_index":"products","_id":"2"}}
{"name":"Mouse","price":25}
{"index":{"_index":"products","_id":"3"}}
{"name":"Keyboard","price":75}</div></div>
<ul>
  <li>Format: <strong>NDJSON</strong> (Newline-Delimited JSON)</li>
  <li>File must end with a trailing newline</li>
  <li>Actions: <code>index</code>, <code>create</code>, <code>update</code>, <code>delete</code></li>
</ul>`],

        // Q4
        ["What are the 3 stages of a Logstash pipeline?",
          `<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">┌──────────────┐     ┌────────────────┐     ┌────────────────┐
│    INPUT     │ ──► │     FILTER     │ ──► │     OUTPUT     │
│   (source)   │     │  (transform)   │     │ (destination)  │
└──────────────┘     └────────────────┘     └────────────────┘

Input plugins:        Filter plugins:       Output plugins:
  • stdin               • grok                • elasticsearch
  • file                • mutate              • stdout
  • beats               • date                • file
  • kafka               • geoip               • kafka</div></div>
<p><strong>Input</strong> reads data → <strong>Filter</strong> transforms it → <strong>Output</strong> sends it.</p>`],

        // Q5
        ["What is a Mapping Explosion and how do you prevent it?",
          `<p>A Mapping Explosion occurs when <strong>dynamic mapping</strong> creates thousands of fields automatically from uncontrolled input data.</p>
<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">❌ Bad: dynamic mapping on user-generated JSON
   { "user_field_abc123": "val" }  → new mapping!
   { "user_field_xyz789": "val" }  → another!
   ... × 100,000 fields = 💥 Mapping Explosion

✅ Good: strict mapping
   PUT my_index
   { "mappings": { "dynamic": "strict" } }
   → unknown fields are REJECTED</div></div>
<p><strong>Prevention:</strong></p>
<ul>
  <li>Set <code>"dynamic": "strict"</code> to reject unknown fields</li>
  <li>Use <code>index.mapping.total_fields.limit</code> (default: 1000)</li>
  <li>Define <strong>explicit mappings</strong> before indexing</li>
</ul>`]
      ],

      m4: [
        // Q1
        ["What is the difference between match and term queries?",
          `<div class="copy-wrap"><button class="copy-btn-overlay" onclick="cpCode(this)">&#128203; Copy</button><div class="diagram">┌─────────────────────┬─────────────────────────┐
│    match query      │      term query          │
├─────────────────────┼─────────────────────────┤
│ Input is ANALYZED   │ Input is NOT analyzed    │

    let currentTopic = null, questions = [], index = 0;
    function startTopic(key) {
      currentTopic = key; questions = quizData[key]; index = 0;
      document.getElementById("topicScreen").style.display = "none";
      document.getElementById("quizScreen").style.display = "block";
      document.getElementById("topicTitle").innerText = titles[key];
      loadQ();
    }
    function loadQ() {
      document.getElementById("question").innerText = questions[index][0];
      document.getElementById("answerBox").innerHTML = questions[index][1];
      document.getElementById("answerBox").style.display = "none";
      document.getElementById("counter").innerText = (index + 1) + " / " + questions.length;
      document.getElementById("progressFill").style.width = (index / questions.length * 100) + "%";
    }
    function nextQ() { if (index < questions.length - 1) { index++; loadQ(); } }
    function prevQ() { if (index > 0) { index--; loadQ(); } }
    function reveal() {
      document.getElementById("answerBox").style.display = "block";
      document.getElementById("progressFill").style.width = ((index + 1) / questions.length * 100) + "%";
    }
    function back() {
      document.getElementById("quizScreen").style.display = "none";
      document.getElementById("topicScreen").style.display = "block";
    }

    function cpCode(btn) {
      var el = btn.parentElement.querySelector('.c0,.j,.d,.cmd-block,.json-block,.diagram');
      var txt = el ? (el.innerText || el.textContent) : '';
      navigator.clipboard.writeText(txt).catch(function () {
        var t = document.createElement('textarea'); t.value = txt;
        document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
      });
      btn.textContent = '\u2713 Copied!'; btn.classList.add('ok');
      setTimeout(function () { btn.innerHTML = '&#128203; Copy'; btn.classList.remove('ok'); }, 2000);
    }
